name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          path: neoanki-tts
      - uses: actions/checkout@v7
        with:
          repository: neoanki/neo-anki
          path: neo-anki
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            neoanki-tts/package-lock.json
            neo-anki/package-lock.json
      - run: npm ci && npm run extension:sdk
        working-directory: neo-anki
      - run: npm ci
        working-directory: neoanki-tts
      - run: npm test
        working-directory: neoanki-tts
      - run: npm run typecheck
        working-directory: neoanki-tts
      - run: npm run check
        working-directory: neoanki-tts
      - run: npm run build
        working-directory: neoanki-tts
      - run: npm run build && npm run desktop:prepare
        working-directory: neo-anki
      - if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:desktop
        working-directory: neoanki-tts
      - if: runner.os == 'macOS'
        run: npm run test:desktop
        working-directory: neoanki-tts
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: neoanki-tts-extension
          path: neoanki-tts/build/*.neoanki-extension
