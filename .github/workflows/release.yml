name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          path: neoanki-tts
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/checkout@v7
        with:
          repository: neoanki/neo-anki
          path: neo-anki
          ref: 02c75ab13b339885d3b13f7267aee810579b6c77
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            neoanki-tts/package-lock.json
            neo-anki/package-lock.json
      - run: npm ci && npm run extension:sdk
        working-directory: neo-anki
      - run: npm ci
        working-directory: neoanki-tts
      - name: Verify and record immutable source inputs
        shell: bash
        run: |
          source_commit="$(git -C neoanki-tts rev-parse HEAD)"
          core_commit="$(git -C neo-anki rev-parse HEAD)"
          declared_core="$(node -p "require('./neoanki-tts/package.json').neoAnki.coreRef")"
          test "$core_commit" = "$declared_core"
          echo "NEO_ANKI_EXTENSION_SOURCE_COMMIT=$source_commit" >> "$GITHUB_ENV"
          echo "NEO_ANKI_EXTENSION_CORE_COMMIT=$core_commit" >> "$GITHUB_ENV"
      - name: Require protected publisher signing key
        env:
          SIGNING_KEY: ${{ secrets.NEO_ANKI_EXTENSION_SIGNING_KEY }}
        run: test -n "$SIGNING_KEY"
        working-directory: neoanki-tts
      - run: npm run test:coverage && npm run typecheck && npm run check && npm run build
        working-directory: neoanki-tts
        env:
          NEO_ANKI_EXTENSION_SIGNING_KEY: ${{ secrets.NEO_ANKI_EXTENSION_SIGNING_KEY }}
      - name: Verify reproducible extension package
        shell: bash
        run: |
          first="$(sha256sum build/*.neoanki-extension | awk '{print $1}')"
          npm run build >/dev/null
          second="$(sha256sum build/*.neoanki-extension | awk '{print $1}')"
          test "$first" = "$second"
        working-directory: neoanki-tts
        env:
          NEO_ANKI_EXTENSION_SIGNING_KEY: ${{ secrets.NEO_ANKI_EXTENSION_SIGNING_KEY }}
      - name: Verify packaged provenance matches checked-out inputs
        shell: bash
        working-directory: neoanki-tts
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, readdirSync } from 'node:fs'
          import { parseExtensionPackage } from '@neo-anki/extension-sdk'
          const name = readdirSync('build').find((value) => value.endsWith('.neoanki-extension'))
          if (!name) throw new Error('No extension package was produced.')
          const manifest = parseExtensionPackage(readFileSync(`build/${name}`)).manifest
          if (manifest.provenance.sourceCommit !== process.env.NEO_ANKI_EXTENSION_SOURCE_COMMIT || manifest.provenance.coreCommit !== process.env.NEO_ANKI_EXTENSION_CORE_COMMIT) throw new Error('Packaged provenance does not match the checked-out source inputs.')
          NODE
      - run: npm audit --audit-level=high
        working-directory: neoanki-tts
      - run: npm run build && npm run desktop:prepare
        working-directory: neo-anki
      - run: xvfb-run --auto-servernum npm run test:desktop
        working-directory: neoanki-tts
      - name: Create checksums
        run: cd build && sha256sum *.neoanki-extension > SHA256SUMS.txt
        working-directory: neoanki-tts
      - name: Create CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx > build/neoanki-tts.cdx.json
        working-directory: neoanki-tts
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'neoanki-tts/build/*'
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$RELEASE_TAG" build/*.neoanki-extension build/*.cdx.json build/SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
        working-directory: neoanki-tts
