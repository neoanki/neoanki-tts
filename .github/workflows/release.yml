name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: neoanki-tts
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/checkout@v4
        with:
          repository: neoanki/neo-anki
          path: neo-anki
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            neoanki-tts/package-lock.json
            neo-anki/package-lock.json
      - run: npm ci && npm run extension:sdk
        working-directory: neo-anki
      - run: npm ci
        working-directory: neoanki-tts
      - run: npm test && npm run typecheck && npm run check && npm run build
        working-directory: neoanki-tts
      - run: npm run build && npm run desktop:prepare
        working-directory: neo-anki
      - run: xvfb-run --auto-servernum npm run test:desktop
        working-directory: neoanki-tts
      - name: Create checksums
        run: cd build && sha256sum *.neoanki-extension > SHA256SUMS.txt
        working-directory: neoanki-tts
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$RELEASE_TAG" build/*.neoanki-extension build/SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
        working-directory: neoanki-tts
